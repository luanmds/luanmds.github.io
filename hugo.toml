baseURL = "https://luanmds.github.io/"
title = "Luan Martins"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true

defaultContentLanguage = "pt"
defaultContentLanguageInSubdir = false

[minify]
  disableXML = true
  minifyOutput = true

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  author = "Luan Mello"
  description = "Blog sobre tecnologia, desenvolvimento de software e mais."
  defaultTheme = "auto"
  disableThemeToggle = false

  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = true
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "Olá! 👋"
    Content = "Bem-vindo ao meu blog. Sou Luan Mello, engenheiro de software back-end do Rio de Janeiro. Escrevo sobre tecnologia, desenvolvimento de software e o que mais me interessar."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/luanmds"

  [params.giscus]
    repo = "luanmds/luanmds.github.io"
    repoId = ""        # preencha após configurar Giscus em giscus.app
    category = "Announcements"
    categoryId = ""    # preencha após configurar Giscus em giscus.app
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    theme = "preferred_color_scheme"
    lang = "pt"

[taxonomies]
  tag = "tags"
  category = "categories"

[languages]
  [languages.pt]
    languageName = "Português"
    weight = 1
    title = "Luan Mello"
    [languages.pt.params]
      description = "Blog sobre tecnologia, desenvolvimento de software e mais."
    [languages.pt.menus]
      [[languages.pt.menus.main]]
        identifier = "posts"
        name = "Posts"
        url = "/posts/"
        weight = 1
      [[languages.pt.menus.main]]
        identifier = "tags"
        name = "Tags"
        url = "/tags/"
        weight = 2
      [[languages.pt.menus.main]]
        identifier = "search"
        name = "Buscar"
        url = "/search/"
        weight = 3
      [[languages.pt.menus.main]]
        identifier = "about"
        name = "Sobre"
        url = "/about/"
        weight = 4

  [languages.en]
    languageName = "English"
    weight = 2
    title = "Luan Mello"
    contentDir = "content/en"
    [languages.en.params]
      description = "Blog about technology, software development and more."
      [languages.en.params.homeInfoParams]
        Title = "Hey there! 👋"
        Content = "Welcome to my blog. I'm Luan Mello, a back-end software engineer from Rio de Janeiro, Brazil. I write about technology, software development and whatever else I find interesting."
    [languages.en.menus]
      [[languages.en.menus.main]]
        identifier = "posts"
        name = "Posts"
        url = "/en/posts/"
        weight = 1
      [[languages.en.menus.main]]
        identifier = "tags"
        name = "Tags"
        url = "/en/tags/"
        weight = 2
      [[languages.en.menus.main]]
        identifier = "search"
        name = "Search"
        url = "/en/search/"
        weight = 3
      [[languages.en.menus.main]]
        identifier = "about"
        name = "About"
        url = "/en/about/"
        weight = 4
