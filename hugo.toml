baseURL = "https://luanmds.github.io/"
title = "LuanMDS | Software Enginner"
theme = "congo"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true

defaultContentLanguage = "pt"
defaultContentLanguageInSubdir = false
summaryLength = 0

[module]
  [[module.mounts]]
    # PT language reads content/ but excludes the nested en/ directory
    source = "content"
    target = "content"
    lang = "pt"
    excludeFiles = ["en/**"]
  [[module.mounts]]
    # EN language reads only content/en/
    source = "content/en"
    target = "content"
    lang = "en"

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[minify]
  disableXML = true
  minifyOutput = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\\[', '\\]'], ['$$', '$$']]
          inline = [['\\(', '\\)']]
  [markup.highlight]
    noClasses = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[taxonomies]
  category = "categories"

[params]
  colorScheme = "graphite"
  defaultAppearance = "light"
  autoSwitchAppearance = true
  defaultThemeColor = "#f8fafc"
  enableSearch = true
  enableCodeCopy = true
  enableImageLazyLoading = true
  enableImageWebp = true
  fingerprintAlgorithm = "sha256"
  mainSections = ["posts"]
  description = "Blog sobre tecnologia, desenvolvimento de software e mais."

  [params.header]
    layout = "hybrid"
    logo = "img/logo_blog.png"
    logoDark = "img/logo_blog_dark.png"
    showTitle = true

  [params.footer]
    showCopyright = true
    showThemeAttribution = false
    showAppearanceSwitcher = false
    showScrollToTop = true

  [params.homepage]
    layout = "custom"
    showRecent = true
    recentLimit = 6

  [params.article]
    showDate = true
    showDateUpdated = false
    showAuthor = true
    showBreadcrumbs = true
    showDraftLabel = true
    showEdit = false
    editAppendPath = true
    showHeadingAnchors = true
    showPagination = true
    invertPagination = false
    showReadingTime = true
    showTableOfContents = true
    showTaxonomies = true
    showWordCount = false
    showComments = false

  [params.list]
    showBreadcrumbs = false
    showSummary = true
    showTableOfContents = false
    showTaxonomies = true
    groupByYear = true
    paginationWidth = 1

  [params.taxonomy]
    showTermCount = true

  [params.giscus]
    repo = "luanmds/luanmds.github.io"
    repoId = ""
    category = "Announcements"
    categoryId = ""
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    theme = "preferred_color_scheme"
    lang = "pt"

[languages]
  [languages.pt]
    languageCode = "pt-BR"
    languageName = "Português"
    languageDirection = "ltr"
    weight = 1
    title = "LuanMDS | Software Enginner"
    [languages.pt.params]
      dateFormat = "2 Jan 2006"
      mainSections = ["posts"]
      description = "Blog sobre tecnologia, desenvolvimento de software e mais."
      [languages.pt.params.author]
        name = "Luan Mello"
        headline = "Engenheiro de software back-end no Rio de Janeiro, focado em .NET, arquitetura distribuida e boas praticas de engenharia."
        bio = "Documentando meus estudos através de artigos e tutoriais sobre os principais temas de Engenharia de Software"
        links = [
          { github = "https://github.com/luanmds" },
          { linkedin = "https://www.linkedin.com/in/luanmds/" },
          { medium = "https://luanmds.medium.com/" },
          { dev = "https://dev.to/luanmds" },
        ]
    [languages.pt.menus]
      [[languages.pt.menus.main]]
        identifier = "posts"
        name = "Posts"
        pageRef = "posts"
        weight = 10
      [[languages.pt.menus.main]]
        identifier = "search"
        name = "Buscar"
        weight = 30
        [languages.pt.menus.main.params]
          action = "search"
      [[languages.pt.menus.main]]
        identifier = "about"
        name = "Sobre"
        pageRef = "about"
        weight = 40
      [[languages.pt.menus.main]]
        identifier = "github"
        url = "https://github.com/luanmds"
        weight = 45
        [languages.pt.menus.main.params]
          icon = "github"
          showName = false
          target = "_blank"
      [[languages.pt.menus.main]]
        identifier = "locale"
        weight = 50
        [languages.pt.menus.main.params]
          action = "locale"
      [[languages.pt.menus.main]]
        identifier = "appearance"
        weight = 60
        [languages.pt.menus.main.params]
          action = "appearance"
          showName = false

  [languages.en]
